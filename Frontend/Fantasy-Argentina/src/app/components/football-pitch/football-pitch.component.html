<div class="pitch-outer">
  <div class="formation-bar">
    <label class="formation-label">
      Formación
      <select [(ngModel)]="formation" (ngModelChange)="onFormationChange()">
        @for (f of formations; track f) {
          <option [value]="f">{{ f }}</option>
        }
      </select>
    </label>
  </div>

  <div class="pitch-wrapper">
    <img class="pitch-img" src="assets/cancha-futbol.png" alt="" />

    <div class="pitch-grid" cdkDropListGroup>
      @for (slot of slots; track slot.slotId) {
        <div
          class="pitch-slot"
          [class.invalid-slot]="isSlotMismatch(slot)"
          [style.grid-row]="slot.gridRow"
          [style.grid-column]="slot.gridCol"
          cdkDropList
          [cdkDropListData]="slot"
          (cdkDropListDropped)="dropSlot($any($event))"
        >
          <span class="slot-pos">{{ slot.position | slice:0:3 | uppercase }}</span>

          @if (slot.player) {
            <article class="pitch-card" cdkDrag [cdkDragData]="slot.player">
              <p class="pc-name">{{ slot.player.name }}</p>
              <small class="pc-team">{{ slot.player.teamName }}</small>
              <span class="pc-score">{{ slot.player.lastScore ?? 0 }} pts</span>
            </article>
          } @else {
            <div class="pitch-empty">Vacío</div>
          }
        </div>
      }
    </div>
  </div>
</div>
