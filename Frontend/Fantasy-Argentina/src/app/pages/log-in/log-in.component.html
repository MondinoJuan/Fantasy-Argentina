<section class="auth-page">
  <div class="auth-card">
    <h1>Bienvenido a Fantasy Argentina</h1>
    <p class="subtitle">Iniciá sesión para ver tus torneos y seguir compitiendo.</p>

    <form [formGroup]="loginForm" (ngSubmit)="submit()" novalidate>
      <label>
        Email
        <input type="email" formControlName="mail" placeholder="tu@email.com" autocomplete="username" />
      </label>
      <small class="error" *ngIf="loginForm.controls.mail.invalid && loginForm.controls.mail.touched">
        Ingresá un email válido.
      </small>

      <label>
        Contraseña
        <input type="password" formControlName="password" placeholder="********" autocomplete="current-password" />
      </label>
      <small class="error" *ngIf="loginForm.controls.password.invalid && loginForm.controls.password.touched">
        La contraseña debe tener al menos 4 caracteres.
      </small>

      <p class="error-message" *ngIf="errorMessage">{{ errorMessage }}</p>

      <button type="submit" [disabled]="isLoading">
        {{ isLoading ? 'Entrando...' : 'Entrar' }}
      </button>
    </form>

    <app-loading-spinner *ngIf="isLoading" label="Validando credenciales" size="2.1rem" />

    <p class="switch-link">
      ¿No tenés cuenta?
      <a routerLink="/signUp">Registrate acá</a>
    </p>
  </div>
</section>
