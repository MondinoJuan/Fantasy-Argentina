<section class="superadmin-page">
  <header>
    <h1>Menú de Superadministrador</h1>
    <button (click)="logout()">Cerrar sesión</button>
  </header>

  <section class="actions-section">
    <h2>Persistencia</h2>
    <div class="actions-grid">
      <button *ngFor="let action of persistenceActions" (click)="openAction(action)">{{ actionConfig[action].title }}</button>
      <button (click)="openAction('getPersistedFixture')">{{ actionConfig['getPersistedFixture'].title }}</button>
    </div>
  </section>

  <section class="actions-section">
    <h2>GetAll (.json)</h2>
    <div class="actions-grid">
      <button *ngFor="let action of getAllActions" (click)="openAction(action)">{{ actionConfig[action].title }}</button>
    </div>
  </section>

  <section class="actions-section">
    <h2>Actualización</h2>
    <div class="actions-grid">
      <button *ngFor="let action of updateActions" (click)="openAction(action)">{{ actionConfig[action].title }}</button>
    </div>
  </section>

  <div class="modal-backdrop" *ngIf="currentAction">
    <div class="modal-card">
      <h2>{{ currentActionTitle }}</h2>

      <form [formGroup]="actionForm" (ngSubmit)="submitAction()">
        <label *ngFor="let field of currentFields">
          {{ fieldLabels[field] }}
          <input
            [type]="field === 'descripcion' || field === 'country' ? 'text' : 'number'"
            [formControlName]="field"
          >
        </label>

        <div class="modal-actions">
          <button type="button" class="secondary" (click)="closeModal()">Cancelar</button>
          <button type="submit" [disabled]="isLoading">{{ isLoading ? 'Ejecutando...' : 'Ejecutar' }}</button>
        </div>
      </form>
    </div>
  </div>

  <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>
  <p class="success" *ngIf="successMessage">{{ successMessage }}</p>

  <section class="result-box" *ngIf="result">
    <h3>Respuesta</h3>
    <pre>{{ result | json }}</pre>
  </section>
</section>
