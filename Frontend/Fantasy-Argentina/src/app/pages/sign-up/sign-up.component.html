<section class="auth-page">
  <div class="auth-card">
    <h1>Crear cuenta</h1>
    <p class="subtitle">Registrate para armar y jugar torneos con tus amigos.</p>

    <form [formGroup]="signUpForm" (ngSubmit)="submit()" novalidate>
      <label>
        Usuario
        <input type="text" formControlName="username" placeholder="nombre_usuario" />
      </label>
      <small class="error" *ngIf="signUpForm.controls.username.invalid && signUpForm.controls.username.touched">
        El usuario debe tener al menos 3 caracteres.
      </small>

      <label>
        Email
        <input type="email" formControlName="mail" placeholder="tu@email.com" />
      </label>
      <small class="error" *ngIf="signUpForm.controls.mail.invalid && signUpForm.controls.mail.touched">
        Ingresá un email válido.
      </small>

      <label>
        Contraseña
        <input type="password" formControlName="password" placeholder="********" />
      </label>
      <small class="error" *ngIf="signUpForm.controls.password.invalid && signUpForm.controls.password.touched">
        La contraseña debe tener al menos 4 caracteres.
      </small>

      <label>
        Código superadministrador (opcional)
        <input type="password" formControlName="superadminCode" placeholder="Código especial" />
      </label>

      <p class="error-message" *ngIf="errorMessage">{{ errorMessage }}</p>
      <p class="success-message" *ngIf="successMessage">{{ successMessage }}</p>

      <button type="submit" [disabled]="isLoading">{{ isLoading ? 'Creando...' : 'Crear cuenta' }}</button>
    </form>

    <app-loading-spinner *ngIf="isLoading" label="Creando usuario" size="2.1rem" />

    <div class="separator">
      <span>o</span>
    </div>

    <a class="google-link" routerLink="/logIn">Registrarme con Google</a>

    <p class="switch-link">
      ¿Ya tenés cuenta?
      <a routerLink="/logIn">Volver a iniciar sesión</a>
    </p>
  </div>
</section>
