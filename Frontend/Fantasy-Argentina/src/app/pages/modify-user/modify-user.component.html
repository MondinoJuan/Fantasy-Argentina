<section class="auth-page">
  <div class="auth-card">
    <h1>Modificar usuario</h1>
    <p class="subtitle">Actualizá tus datos personales.</p>

    <form [formGroup]="modifyUserForm" (ngSubmit)="save()" novalidate>
      <label>
        Nombre de usuario
        <input type="text" formControlName="username" placeholder="Tu usuario" />
      </label>
      <small class="error" *ngIf="modifyUserForm.controls.username.invalid && modifyUserForm.controls.username.touched">
        Ingresá al menos 3 caracteres.
      </small>

      <label>
        Email
        <input type="email" formControlName="mail" placeholder="tu@email.com" />
      </label>
      <small class="error" *ngIf="modifyUserForm.controls.mail.invalid && modifyUserForm.controls.mail.touched">
        Ingresá un email válido.
      </small>

      <label>
        Contraseña
        <input type="password" formControlName="password" placeholder="********" />
      </label>
      <small class="error" *ngIf="modifyUserForm.controls.password.invalid && modifyUserForm.controls.password.touched">
        La contraseña debe tener al menos 4 caracteres.
      </small>

      <p class="error-message" *ngIf="errorMessage">{{ errorMessage }}</p>
      <p class="success-message" *ngIf="successMessage">{{ successMessage }}</p>

      <button type="submit" [disabled]="isLoading">Guardar cambios</button>
      <a routerLink="/landingPage" class="back-link">Volver</a>
    </form>

    <app-loading-spinner *ngIf="isLoading" label="Actualizando usuario" size="2rem" />
  </div>
</section>
